<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Chat Sidebar Layout</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="style.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script> 
</head>

<body>

<!-- Top Header -->
<div class="topbar">
    <div class="topbar-title">My Website Header</div>
    <button class="icon-btn" id="sendOutput">Test</button>
    <button class="icon-btn" id="toggleUpload">Upload</button>

</div>

<!-- File Upload Panel -->
<div id="fileUploadPanel"></div>

<!-- Main Content -->
<div class="content">
    <h2>Main Content</h2>
    <p>This page includes a right-side chat panel that can be toggled.</p>

    <div id="fetch-section">
        <input type="text" id="fetch-url" placeholder="Enter webpage URL..." />
        <button id="fetch-btn">Fetch Page</button>
        <button id="export-pdf-btn" disabled>Export PDF</button>
        <p id="fetch-status"></p>
    </div>
</div>

<!-- Chat Sidebar -->
<div class="sidebar-right" id="chatSidebar">
    <div class="resize-handle" id="resizeHandle"></div>

    <div class="chat-header">
        <button class="close-chat-btn" id="closeChatBtn">×</button>
        <div class="chat-header-title">Chat</div>
    </div>

    <div class="chat-messages" id="chatMessages"></div>

    <div class="chat-input">
        <input type="text" id="chatInput" placeholder="Type a message..." />
        <button id="sendBtn">Send</button>
    </div>
</div>

<!-- Floating open button -->
    <button class="chat-fab" id="openChatBtn">Chat</button>

<div id="pdf-source" style="position:absolute; left:-9999px; width:800px; background:#fff; color:#000; padding:20px;"></div>

<script src="chatsb.js"></script>
<script src="filepanelupload.js"></script>
</body>
</html>
