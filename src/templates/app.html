<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Layout</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}"">
<script src=" https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js">
</script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</head>

<body>
    <!-- Top Header -->
    <div class="topbar">
        <div class="topbar-title">LearningDebugger</div>
        <div class="viewer-buttons">
            <button id="NextLine">Next Line</button>
            <button id="prevLine">Previous Line</button>
            <button id="nextPage">Next Page</button>
            <button id="prevPage">Previous Page</button>
            <button id="togglePdf">Show/Hide PDF</button>
            <button id="stepIn">Step In</button>
            <button id="stepOut">Step Out</button>
            </div>
        </div>

        <!-- File Upload Panel -->
        <div class="sidebar-left" id="fileUploadPanel"></div>

        <div class="upload-fileslist" id="uploadedFilesList"></div>

        <!-- Main Content -->
        <div class="content">
            <div id="fetch-section">
                    <input type="text" id="fetch-url" placeholder="Enter webpage URL..." />
                    <button id="fetch-btn">Fetch Page</button>
                    <button id="export-pdf-btn" disabled>Export PDF</button>
                    <p id="fetch-status"></p>
                </div>
            <div class="viewer-container">
                <div class="viewer-left">
                    <canvas id="pdf"
                        style="border: 1px solid black; direction:ltr"></canvas>
                </div>
                <div class="viewer-right">
                    <div id="textDiv">
                    </div>
                </div>
            </div>

            <!-- Chat Sidebar -->
            <div class="sidebar-right" id="chatSidebar">
                <div class="resize-handle" id="resizeHandle"></div>

                <div class="chat-header">
                    <button class="close-chat-btn" id="closeChatBtn">×</button>
                    <div class="chat-header-title">Chat</div>
                </div>

                <div class="chat-messages" id="chatMessages"></div>

                <div class="chat-input">
                    <input type="text" id="chatInput" placeholder="Type a message..." />
                    <button id="sendBtn">Send</button>
                </div>
            </div>

            <!-- Floating buttons -->
            <button class="chat-fab" id="openChatBtn">Chat</button>
            <button class="upload-fab" id="openUploadBtn">Select Files</button>

            <div id="pdf-source"
                style="position:absolute; left:-9999px; width:800px; background:#fff; color:#000; padding:20px;"></div>
            <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
            <script src="https://cdn.jsdelivr.net/npm/dompurify/dist/purify.min.js"></script>

            <script src="{{ url_for('static', filename='chatsb.js') }}"></script>
            <script src="{{ url_for('static', filename='filepanelupload.js') }}"></script>
            <script type="module" src="{{ url_for('static', filename='view.js') }}"></script>
</body>

</html>
